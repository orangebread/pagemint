<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>PageMint history recovery</title>
    <link rel="icon" href="/icon/32.png" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        align-items: center;
        background: Canvas;
        color: CanvasText;
        display: flex;
        min-height: 100vh;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 520px;
        padding: 32px;
      }

      h1 {
        font-size: 24px;
        font-weight: 650;
        letter-spacing: 0;
        margin: 0 0 12px;
      }

      p {
        color: color-mix(in srgb, CanvasText 76%, Canvas 24%);
        font-size: 15px;
        line-height: 1.55;
        margin: 0 0 18px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button,
      a {
        border: 1px solid color-mix(in srgb, CanvasText 22%, Canvas 78%);
        border-radius: 6px;
        color: CanvasText;
        cursor: pointer;
        font: inherit;
        padding: 9px 12px;
        text-decoration: none;
      }

      button {
        background: CanvasText;
        color: Canvas;
      }

      a {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Restoring Chrome history</h1>
      <p id="status">PageMint is reloading so Chrome can remove an old browser-history override from this profile.</p>
      <div class="actions">
        <button id="retry" type="button">Retry repair</button>
        <a href="/local-history.html">Open PageMint local history</a>
      </div>
    </main>
    <script src="/history-recovery.js"></script>
  </body>
</html>
